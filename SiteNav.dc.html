<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  @keyframes pp-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes pp-sparkle { 0%,100% { opacity: .3; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.15); } }
  @keyframes pp-menuin { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: none; } }
  .pp-burger { display: none !important; }
  @media (max-width: 1080px) {
    .pp-nav-links, .pp-nav-icons { display: none !important; }
    .pp-burger { display: grid !important; }
  }
  @media (max-width: 480px) {
    .pp-cta { display: none !important; }
  }
</style>
</helmet>
<div style="position:fixed;top:0;left:0;right:0;z-index:900;transition:background .35s ease, box-shadow .35s ease, backdrop-filter .35s ease;background:{{ navBg }};box-shadow:{{ navShadow }};backdrop-filter:{{ navBlur }};-webkit-backdrop-filter:{{ navBlur }}">
  <div style="max-width:1440px;margin:0 auto;display:flex;align-items:center;gap:20px;padding:12px 28px">
    <a href="Pixel Pirates.dc.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0">
      <div style="width:42px;height:42px;border-radius:12px;background:linear-gradient(160deg,#FFC233,#E0921F);display:grid;place-items:center;box-shadow:0 3px 0 rgba(0,0,0,.35), inset 0 2px 0 rgba(255,255,255,.45);animation:pp-float 4s ease-in-out infinite">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 3c-4.4 0-8 3.1-8 7 0 2 .9 3.6 2.4 4.8l-.4 3 3-1.2c.9.3 2 .4 3 .4s2.1-.1 3-.4l3 1.2-.4-3C19.1 13.6 20 12 20 10c0-3.9-3.6-7-8-7Z" fill="#14181F"/><circle cx="9" cy="10" r="1.7" fill="#FFC233"/><circle cx="15" cy="10" r="1.7" fill="#FFC233"/><rect x="10.6" y="13.2" width="2.8" height="1.6" rx=".8" fill="#FFC233"/></svg>
      </div>
      <div style="font-family:Fredoka,sans-serif;font-weight:700;font-size:20px;line-height:1;letter-spacing:.5px;color:#FFF8EA;text-shadow:0 2px 0 rgba(0,0,0,.4)">PIXEL<span style="color:#FFC233"> PIRATES</span></div>
    </a>
    <nav style="display:flex;align-items:center;gap:2px;flex:1;justify-content:center;flex-wrap:wrap" class="pp-nav-links">
      <sc-for list="{{ links }}" as="lnk" hint-placeholder-count="7">
        <a href="{{ lnk.href }}" style="font-family:Nunito,sans-serif;font-weight:800;font-size:14px;text-decoration:none;padding:8px 13px;border-radius:999px;color:{{ lnk.color }};background:{{ lnk.bg }};transition:background .2s, transform .2s" style-hover="background:rgba(255,194,51,.18);color:#FFC233;transform:translateY(-2px)">{{ lnk.label }}</a>
      </sc-for>
    </nav>
    <div class="pp-nav-icons" style="display:flex;align-items:center;gap:8px">
      <sc-for list="{{ icons }}" as="ic" hint-placeholder-count="3">
        <button title="{{ ic.label }}" onClick="{{ openTeaser }}" style="width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;background:rgba(255,248,234,.12);display:grid;place-items:center;color:#FFF8EA;transition:background .2s, transform .2s" style-hover="background:rgba(255,194,51,.3);transform:scale(1.1)">
          <span style="display:contents">{{ ic.svg }}</span>
        </button>
      </sc-for>
      <button onClick="{{ openTeaser }}" style="font-family:Fredoka,sans-serif;font-weight:600;font-size:15px;letter-spacing:.3px;color:#14181F;background:linear-gradient(180deg,#FFD75E,#FFB61E);border:none;border-radius:999px;padding:10px 20px;cursor:pointer;box-shadow:0 4px 0 #B57708, 0 8px 16px rgba(0,0,0,.3);transition:transform .15s, box-shadow .15s;display:flex;align-items:center;gap:8px" style-hover="transform:translateY(-2px);box-shadow:0 6px 0 #B57708, 0 12px 20px rgba(0,0,0,.35)" style-active="transform:translateY(2px);box-shadow:0 2px 0 #B57708">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M4 2.5v11l9-5.5-9-5.5Z" fill="#14181F"/></svg>
        Watch Trailer
      </button>
    </div>
    <button onClick="{{ toggleMenu }}" aria-label="Menu" class="pp-burger" style="width:42px;height:42px;border-radius:12px;border:none;cursor:pointer;background:rgba(255,248,234,.14);place-items:center;color:#FFF8EA;flex-shrink:0">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="{{ burgerPath }}" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
  <div style="position:fixed;inset:0;z-index:890;background:linear-gradient(180deg,#0B2A4A,#08131f);padding:96px 24px 40px;overflow:auto;animation:pp-menuin .25s ease">
    <nav style="display:flex;flex-direction:column;gap:6px;max-width:420px;margin:0 auto">
      <sc-for list="{{ links }}" as="lnk" hint-placeholder-count="7">
        <a href="{{ lnk.href }}" onClick="{{ closeMenu }}" style="font-family:Fredoka,sans-serif;font-weight:600;font-size:24px;text-decoration:none;padding:14px 20px;border-radius:18px;color:{{ lnk.color }};background:{{ lnk.mobileBg }};transition:background .2s" style-hover="background:rgba(255,194,51,.18)">{{ lnk.label }}</a>
      </sc-for>
      <button onClick="{{ openTeaserFromMenu }}" style="margin-top:16px;font-family:Fredoka,sans-serif;font-weight:600;font-size:19px;color:#14181F;background:linear-gradient(180deg,#FFD75E,#FFB61E);border:none;border-radius:999px;padding:15px 20px;cursor:pointer;box-shadow:0 5px 0 #B57708;display:flex;align-items:center;justify-content:center;gap:10px">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M4 2.5v11l9-5.5-9-5.5Z" fill="#14181F"/></svg>Watch Trailer
      </button>
    </nav>
  </div>
</sc-if>

<sc-if value="{{ teaserOpen }}" hint-placeholder-val="{{ false }}">
  <div onClick="{{ closeTeaser }}" style="position:fixed;inset:0;z-index:1000;background:rgba(8,14,24,.78);backdrop-filter:blur(8px);display:grid;place-items:center;padding:24px">
    <div onClick="{{ stopClick }}" style="position:relative;width:min(680px,94vw);border-radius:28px;overflow:hidden;background:#101823;box-shadow:0 40px 90px rgba(0,0,0,.6);border:3px solid rgba(255,194,51,.5)">
      <div style="position:relative;height:300px;overflow:hidden">
        <img src="assets/poster-red-black.jpeg" alt="Pirate Red and Pirate Black" style="width:100%;height:100%;object-fit:cover;object-position:center 20%">
        <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(16,24,35,0) 40%,#101823 100%)"></div>
        <div style="position:absolute;top:16px;right:16px;width:14px;height:14px;border-radius:50%;background:#FFC233;animation:pp-sparkle 1.6s ease-in-out infinite"></div>
        <div style="position:absolute;top:40px;right:44px;width:8px;height:8px;border-radius:50%;background:#FFF8EA;animation:pp-sparkle 2.2s ease-in-out .4s infinite"></div>
      </div>
      <div style="padding:8px 36px 36px;text-align:center">
        <div style="font-family:Fredoka,sans-serif;font-weight:700;font-size:38px;color:#FFC233;text-shadow:0 3px 0 rgba(0,0,0,.4)">Trailer Coming Soon</div>
        <p style="font-family:Nunito,sans-serif;font-weight:600;font-size:17px;color:rgba(255,248,234,.85);margin:10px auto 22px;max-width:440px;line-height:1.55">The crew is still polishing the cannons! The official Pixel Pirates trailer drops with Season 1. Sign up below and be the first aboard.</p>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <a href="Pixel Pirates.dc.html#news" onClick="{{ closeTeaser }}" style="font-family:Fredoka,sans-serif;font-weight:600;font-size:16px;color:#14181F;background:linear-gradient(180deg,#FFD75E,#FFB61E);text-decoration:none;border-radius:999px;padding:12px 26px;box-shadow:0 4px 0 #B57708;transition:transform .15s" style-hover="transform:translateY(-2px)">Notify Me</a>
          <button onClick="{{ closeTeaser }}" style="font-family:Fredoka,sans-serif;font-weight:600;font-size:16px;color:#FFF8EA;background:rgba(255,248,234,.12);border:2px solid rgba(255,248,234,.3);border-radius:999px;padding:12px 26px;cursor:pointer;transition:background .2s" style-hover="background:rgba(255,248,234,.22)">Back to the Island</button>
        </div>
      </div>
      <button onClick="{{ closeTeaser }}" style="position:absolute;top:14px;left:14px;width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;background:rgba(16,24,35,.7);color:#FFF8EA;font-size:18px;font-family:Nunito,sans-serif;font-weight:800" style-hover="background:#D0342C">✕</button>
    </div>
  </div>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;140px&quot;},&quot;activePage&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Home&quot;,&quot;Characters&quot;,&quot;Fun &amp; Games&quot;,&quot;Discover&quot;,&quot;Shop&quot;,&quot;Media Hub&quot;],&quot;default&quot;:&quot;Home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { solid: false, teaserOpen: false, menuOpen: false };

  componentDidMount() {
    this._onScroll = () => {
      const solid = window.scrollY > 40;
      if (solid !== this.state.solid) this.setState({ solid });
    };
    window.addEventListener('scroll', this._onScroll, { passive: true });
    this._onScroll();
    this._onOpen = () => this.setState({ teaserOpen: true });
    window.addEventListener('pp-open-teaser', this._onOpen);
  }
  componentWillUnmount() {
    window.removeEventListener('scroll', this._onScroll);
    window.removeEventListener('pp-open-teaser', this._onOpen);
  }

  renderVals() {
    const active = this.props.activePage ?? 'Home';
    const linkDefs = [
      ['Home', 'Pixel Pirates.dc.html'],
      ['Characters', 'Characters.dc.html'],
      ['Episodes', 'Pixel Pirates.dc.html#episodes'],
      ['Fun & Games', 'Fun & Games.dc.html'],
      ['Discover', 'Discover.dc.html'],
      ['Shop', 'Shop.dc.html'],
      ['News', 'Pixel Pirates.dc.html#news'],
      ['Media Hub', 'Media Hub.dc.html'],
    ];
    const links = linkDefs.map(([label, href]) => ({
      label, href,
      color: label === active ? '#14181F' : 'rgba(255,248,234,.92)',
      bg: label === active ? 'linear-gradient(180deg,#FFD75E,#FFB61E)' : 'transparent',
      mobileBg: label === active ? 'linear-gradient(180deg,#FFD75E,#FFB61E)' : 'rgba(255,248,234,.06)',
    }));
    const svg = (d) => React.createElement('svg', { width: 17, height: 17, viewBox: '0 0 24 24', fill: 'none' },
      React.createElement('path', { d, stroke: 'currentColor', strokeWidth: 2.2, strokeLinecap: 'round', strokeLinejoin: 'round' }));
    const icons = [
      { label: 'Search', svg: svg('M11 4a7 7 0 1 1 0 14 7 7 0 0 1 0-14Zm9 16-4-4') },
      { label: 'Cart', svg: svg('M3 4h2l2.4 12h11.2L21 8H7M9 20h.01M17 20h.01') },
      { label: 'Profile', svg: svg('M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7 8a7 7 0 0 1 14 0') },
    ];
    return {
      links, icons,
      navBg: this.state.solid ? 'linear-gradient(180deg,#0B2A4A,#0d3156ee)' : 'linear-gradient(180deg,rgba(8,16,28,.55),rgba(8,16,28,0))',
      navShadow: this.state.solid ? '0 10px 30px rgba(4,12,24,.45)' : 'none',
      navBlur: this.state.solid ? 'blur(12px)' : 'none',
      teaserOpen: this.state.teaserOpen,
      menuOpen: this.state.menuOpen,
      burgerPath: this.state.menuOpen ? 'M6 6l12 12M18 6L6 18' : 'M4 7h16M4 12h16M4 17h16',
      toggleMenu: () => this.setState({ menuOpen: !this.state.menuOpen }),
      closeMenu: () => this.setState({ menuOpen: false }),
      openTeaserFromMenu: () => this.setState({ menuOpen: false, teaserOpen: true }),
      openTeaser: () => this.setState({ teaserOpen: true }),
      closeTeaser: () => this.setState({ teaserOpen: false }),
      stopClick: (e) => e.stopPropagation(),
    };
  }
}
</script>
</body>
</html>
